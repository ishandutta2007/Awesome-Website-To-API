<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <!-- Node Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Dash Animation -->
    <style>
      .flow-line {
        stroke-dasharray: 8, 8;
        animation: flow 20s linear infinite;
      }
      @keyframes flow {
        to {
          stroke-dashoffset: -1000;
        }
      }
      .pulse-node {
        animation: pulse 3s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% {
          transform: scale(1);
          filter: drop-shadow(0 0 4px #a855f7);
          opacity: 0.8;
        }
        50% {
          transform: scale(1.15);
          filter: drop-shadow(0 0 15px #6366f1);
          opacity: 1;
        }
      }
      .rotate-gear {
        transform-origin: 600px 200px;
        animation: rotateG 12s linear infinite;
      }
      @keyframes rotateG {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .float-window {
        animation: floatW 6s ease-in-out infinite alternate;
      }
      @keyframes floatW {
        from { transform: translateY(-5px); }
        to { transform: translateY(5px); }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- Grid Overlay for tech aesthetic -->
  <path d="M0,50 L1200,50 M0,100 L1200,100 M0,150 L1200,150 M0,200 L1200,200 M0,250 L1200,250 M0,300 L1200,300 M0,350 L1200,350" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1" />
  <path d="M100,0 L100,400 M200,0 L200,400 M300,0 L300,400 M400,0 L400,400 M500,0 L500,400 M600,0 L600,400 M700,0 L700,400 M800,0 L800,400 M900,0 L900,400 M100,0 L100,400 M1000,0 L1000,400 M1100,0 L1100,400" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1" />

  <!-- Left: Website Mockup Frame (Source) -->
  <g class="float-window" transform="translate(100, 80)">
    <!-- Browser window -->
    <rect width="320" height="240" rx="10" fill="#1e293b" stroke="#334155" stroke-width="2" />
    <!-- Header bar -->
    <rect width="320" height="30" rx="10" fill="#0f172a" />
    <!-- Window buttons -->
    <circle cx="20" cy="15" r="5" fill="#ef4444" />
    <circle cx="35" cy="15" r="5" fill="#eab308" />
    <circle cx="50" cy="15" r="5" fill="#22c55e" />
    <rect cx="70" cy="10" width="180" height="10" rx="5" fill="#334155" x="70" y="10" />
    <!-- Page Content wireframe -->
    <rect x="20" y="50" width="280" height="60" rx="6" fill="#334155" fill-opacity="0.6" />
    <circle cx="60" cy="80" r="20" fill="#6366f1" />
    <rect x="100" y="65" width="180" height="10" rx="3" fill="#475569" />
    <rect x="100" y="85" width="120" height="10" rx="3" fill="#475569" />
    <!-- Content columns -->
    <rect x="20" y="125" width="80" height="85" rx="6" fill="#334155" fill-opacity="0.4" />
    <rect x="110" y="125" width="90" height="85" rx="6" fill="#334155" fill-opacity="0.4" />
    <rect x="210" y="125" width="90" height="85" rx="6" fill="#334155" fill-opacity="0.4" />
  </g>

  <!-- Connection Lines with Dashes (Data Flow) -->
  <!-- Line 1: Upper flow -->
  <path d="M420,180 Q600,100 780,180" fill="none" stroke="#818cf8" stroke-width="3" stroke-opacity="0.5" />
  <path d="M420,180 Q600,100 780,180" fill="none" stroke="#6366f1" stroke-width="3" class="flow-line" />

  <!-- Line 2: Center straight flow -->
  <path d="M420,200 L780,200" fill="none" stroke="#c084fc" stroke-width="3" stroke-opacity="0.5" />
  <path d="M420,200 L780,200" fill="none" stroke="#a855f7" stroke-width="3" class="flow-line" />

  <!-- Line 3: Lower flow -->
  <path d="M420,220 Q600,300 780,220" fill="none" stroke="#38bdf8" stroke-width="3" stroke-opacity="0.5" />
  <path d="M420,220 Q600,300 780,220" fill="none" stroke="#0ea5e9" stroke-width="3" class="flow-line" />

  <!-- Center Hub: AI/Engine representation -->
  <g>
    <!-- Outer decorative gear/ring rotating -->
    <circle cx="600" cy="200" r="55" fill="none" stroke="#4f46e5" stroke-width="2" stroke-dasharray="10 15" class="rotate-gear" />
    <!-- Inner glowing AI orb -->
    <circle cx="600" cy="200" r="35" fill="none" stroke="#a855f7" stroke-width="4" />
    <circle cx="600" cy="200" r="30" fill="#6366f1" fill-opacity="0.2" class="pulse-node" filter="url(#glow)" />
    <text x="600" y="206" font-family="'Segoe UI', Roboto, sans-serif" font-weight="bold" font-size="16" fill="#ffffff" text-anchor="middle">AI</text>
  </g>

  <!-- Right: Structured API / JSON Window (Target) -->
  <g class="float-window" transform="translate(780, 80)" style="animation-delay: -3s;">
    <!-- Code Window Frame -->
    <rect width="320" height="240" rx="10" fill="#0f172a" stroke="#334155" stroke-width="2" />
    <!-- Header bar -->
    <rect width="320" height="30" rx="10" fill="#020617" />
    <circle cx="20" cy="15" r="5" fill="#475569" />
    <circle cx="35" cy="15" r="5" fill="#475569" />
    <circle cx="50" cy="15" r="5" fill="#475569" />
    <!-- API text overlay -->
    <text x="70" y="20" font-family="'Courier New', Courier, monospace" font-size="12" fill="#94a3b8">GET /api/website</text>
    
    <!-- Code Mockup (JSON) -->
    <g transform="translate(25, 60)" font-family="'Courier New', Courier, monospace" font-size="13" font-weight="bold">
      <text x="0" y="15" fill="#f43f5e">{</text>
      <text x="20" y="35" fill="#38bdf8">"status":</text> <text x="100" y="35" fill="#34d399">"success",</text>
      <text x="20" y="55" fill="#38bdf8">"data":</text> <text x="75" y="55" fill="#f43f5e">[</text>
      <text x="40" y="75" fill="#f43f5e">{</text>
      <text x="60" y="95" fill="#38bdf8">"title":</text> <text x="135" y="95" fill="#fbbf24">"Website to API",</text>
      <text x="60" y="115" fill="#38bdf8">"stars":</text> <text x="135" y="115" fill="#f59e0b">89400,</text>
      <text x="60" y="135" fill="#38bdf8">"saas":</text> <text x="125" y="135" fill="#6366f1">true</text>
      <text x="40" y="155" fill="#f43f5e">}</text>
      <text x="20" y="175" fill="#f43f5e">]</text>
      <text x="0" y="195" fill="#f43f5e">}</text>
    </g>
  </g>

  <!-- Glowing Nodes for extra dynamic look -->
  <circle cx="420" cy="200" r="6" fill="#a855f7" class="pulse-node" />
  <circle cx="780" cy="200" r="6" fill="#0ea5e9" class="pulse-node" style="animation-delay: -1.5s;" />

  <!-- Repo Title Text in Banner -->
  <text x="600" y="350" font-family="'Segoe UI', Roboto, sans-serif" font-weight="800" font-size="28" fill="#ffffff" text-anchor="middle" letter-spacing="1.5">
    Awesome Website-To-API Tools
  </text>
  <text x="600" y="375" font-family="'Segoe UI', Roboto, sans-serif" font-weight="400" font-size="14" fill="#94a3b8" text-anchor="middle" letter-spacing="0.5">
    Turn any web content into structured API endpoints
  </text>
</svg>
